name: flutter_application_1
description: "GymSync - Smart Gym Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2

  # Navigation
  go_router: ^17.2.3

  # State management
  provider: ^6.1.2

  # UI / Fonts
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # Charts
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.3

  # QR Code
  qr_flutter: ^4.1.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
